<ng-container>
  <c-container [fluid]="true" class="border-bottom px-3 header-container d-flex align-items-center bg-white shadow-sm">
    
    <div class="d-flex align-items-center">
      <button [cSidebarToggle]="sidebarId()" cHeaderToggler class="btn border-0 shadow-none ps-0 py-0" toggle="visible">
        <svg cIcon name="cilMenu" size="lg"></svg>
      </button>

      <div class="ms-2 d-flex align-items-center branch-container">
        <div class="vr mx-2 text-body text-opacity-25 d-none d-md-block" style="height: 20px;"></div>
        <div class="branch-display d-flex align-items-center">
          <svg cIcon name="cilHome" size="sm" class="text-primary me-1 d-none d-sm-block"></svg>
          <span class="fw-bold text-uppercase branch-text small">
            {{ sucursalNombre.replace('SUCURSAL ', '') }}
          </span>
        </div>
      </div>
    </div>

    <c-header-nav class="ms-auto d-flex align-items-center">

      <a *ngIf="userRole === 'Cobrador'" 
         [routerLink]="['/gasto/registro-egreso-diario']" 
         class="d-flex align-items-center gap-1 balance-text-link" 
         style="text-decoration: none;">
          <span class="fw-bold text-secondary d-none d-md-inline" style="font-size: 0.7rem;">DISPONIBLE:</span>
          <span class="fw-bold text-success value-amount">
            {{ totalEgresos | currency:'USD':'symbol':'1.2-2' }}
          </span>
      </a>

      <div class="vr mx-3 text-body text-opacity-25" style="height: 20px;"></div>

      <c-dropdown alignment="end" variant="nav-item">
        <button [caret]="false" cDropdownToggle class="p-0 border-0 bg-transparent d-flex align-items-center">
          <div class="me-2 text-end d-none d-md-block" style="line-height: 1.1;">
            <div class="fw-bold text-dark small">{{ userName }}</div>
            <div class="fw-bold text-primary" style="font-size: 0.65rem; text-transform: uppercase;">{{ userRole }}</div>
          </div>
          <c-avatar
            shape="rounded-circle"
            [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=f0f2f5&color=3474e1&bold=true'"
            status="success"
            class="custom-avatar shadow-sm border"
          />
        </button>

        <ul cDropdownMenu class="pt-0 shadow-sm border-0">
          <li>
            <a cDropdownItem (click)="onLogout()" class="text-danger fw-bold py-2" style="cursor: pointer;">
              <svg cIcon class="me-2" name="cilAccountLogout"></svg>
              Cerrar Sesión
            </a>
          </li>
        </ul>
      </c-dropdown>
    </c-header-nav>
  </c-container>
</ng-container>
