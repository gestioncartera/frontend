<div class="main-page-container fade-in">
  <mat-card class="modern-card small-card overflow-visible">
    <div class="custom-header gradient-bg">
      <div class="header-wrapper">
        <div class="title-section">
          <div class="icon-circle shadow-sm pulse-icon">
            <mat-icon>account_balance_wallet</mat-icon>
          </div>
          <div class="title-text">
            <mat-card-title>Registrar Gasto</mat-card-title>
            <mat-card-subtitle>Control operativo de sucursal</mat-card-subtitle>
          </div>
        </div>
      </div>
    </div>

    <mat-card-content class="form-container">
      <div class="transaction-type-indicator">
        <mat-icon>arrow_downward</mat-icon>
        <span>Salida de Efectivo</span>
      </div>

      <form class="period-form">
        <mat-form-field appearance="outline" class="w-100 standard-input custom-field">
          <mat-label>Concepto / Motivo</mat-label>
          <mat-icon matPrefix class="field-icon">label</mat-icon>
          <input 
            matInput 
            [(ngModel)]="concepto" 
            name="concepto" 
            placeholder="Ej: Pago de servicios, papelería..." 
            required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100 standard-input highlight-field amount-field">
          <mat-label>Monto del Gasto</mat-label>
          <span matPrefix class="currency-symbol">$</span>
          <input 
            matInput 
            type="number" 
            [(ngModel)]="valor" 
            name="valor" 
            placeholder="0.00" 
            required
            class="amount-input"
            (focus)="valor === 0 ? valor = null : null"
            (blur)="valor === null ? valor = 0 : null" />
          <mat-hint>Ingrese el valor total sin puntos</mat-hint>
        </mat-form-field>

        <div class="actions-wrapper mt-4">
          <button mat-button type="button" class="btn-cancel" (click)="cancelar()">
            Descartar
          </button>
          
          <button 
            mat-flat-button 
            class="btn-submit btn-primary-blue shadow-blue" 
            type="button" 
            (click)="crear()"
            [disabled]="!concepto || !valor || valor <= 0 || loading">
            
            <div class="btn-content" *ngIf="!loading">
              <mat-icon>check_circle</mat-icon>
              <span>Confirmar Gasto</span>
            </div>
            
            <mat-spinner diameter="24" *ngIf="loading" class="white-spinner"></mat-spinner>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
