<mat-card class="change-card">
  <mat-card-title class="d-flex align-items-center">
    <button *ngIf="showBackButton"
            mat-icon-button
            (click)="goBack()"
            class="me-2"
            aria-label="Volver a la página anterior"
            title="Volver">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span>Selección de Sucursal</span>
  </mat-card-title>

  <form class="change-form">

    <!-- Sucursal -->
    <mat-form-field appearance="outline">
      <mat-label>Seleccionar sucursal</mat-label>
      <mat-select [(ngModel)]="selectedId" name="sucursal" required>
        <mat-option value="">-- Seleccione --</mat-option>
        <mat-option *ngFor="let s of sucursales" [value]="s.sucursal_id">
          {{ s.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Acciones -->
    <div class="actions">
      <button mat-raised-button color="primary" type="button" (click)="changeSucursal()">
        Guardar
      </button>
    </div>

  </form>
</mat-card>
