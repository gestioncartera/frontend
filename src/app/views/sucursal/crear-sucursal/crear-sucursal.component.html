<div class="main-page-container fade-in">
  <mat-card class="modern-card">
    
    <div class="card-header-premium">
      <div class="header-content">
        <div class="icon-box">
          <mat-icon>storefront</mat-icon>
        </div>
        <div class="title-group">
          <h1 class="main-title">Nueva Sucursal</h1>
          <p class="sub-title">Configuración de punto de recaudo</p>
        </div>
      </div>
    </div>

    <mat-card-content class="form-content-area">
      <form (ngSubmit)="crear()" class="form-grid">
        
        <mat-form-field appearance="outline" class="w-100 custom-field">
          <mat-label>Nombre de la Sucursal</mat-label>
          <mat-icon matPrefix>business</mat-icon>
          <input matInput [(ngModel)]="nombre" name="nombre" placeholder="Ej: Sucursal Norte" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100 custom-field">
          <mat-label>Dirección</mat-label>
          <mat-icon matPrefix>location_on</mat-icon>
          <input matInput [(ngModel)]="direccion" name="direccion" placeholder="Calle 10 #20..." required />
        </mat-form-field>

        <div class="field-row-compact">
          <mat-form-field appearance="outline" class="flex-2 custom-field">
            <mat-label>Teléfono</mat-label>
            <mat-icon matPrefix>phone</mat-icon>
            <input matInput [(ngModel)]="telefono" name="telefono" placeholder="300 000 0000" required />
          </mat-form-field>

          <mat-form-field appearance="outline" class="flex-1 custom-field">
            <mat-label>Estado</mat-label>
            <mat-select [(ngModel)]="estado" name="estado">
              <mat-option value="ACTIVA">Activa</mat-option>
              <mat-option value="INACTIVA">Inactiva</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="form-actions-bar">
          <button mat-button type="button" class="btn-cancel-soft" (click)="cancelar()">
            Cancelar
          </button>
          
          <button mat-flat-button class="btn-primary-gradient" type="submit" [disabled]="loading">
            <mat-icon *ngIf="!loading">save</mat-icon>
            <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
            <span>{{ loading ? 'Procesando...' : 'Guardar Sucursal' }}</span>
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
