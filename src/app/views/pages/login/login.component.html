<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center login-container">
  <c-container>
    <c-row class="justify-content-center">
      <c-col md="8" lg="5" xl="4">
        <c-card class="p-4 shadow border-0">
          <c-card-body>
            <form cForm [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="text-center mb-4">
                <h1 class="fw-bold">Iniciar Sesión</h1>
                <p class="text-body-secondary">Gestión de Cobros Diarios</p>
              </div>
               
              
              <div *ngIf="errorMessage" class="alert alert-danger py-2" role="alert">
                <small>{{ errorMessage }}</small>
              </div>

              <c-input-group class="mb-3">
                <span cInputGroupText>
                  <svg cIcon name="cilUser"></svg>
                </span>
                <input 
                  cFormControl 
                  placeholder="Email" 
                  type="email"
                  formControlName="email"
                />
              </c-input-group>

              <c-input-group class="mb-4">
                <span cInputGroupText>
                  <svg cIcon name="cilLockLocked"></svg>
                </span>
                <input
                  cFormControl
                  placeholder="Contraseña"
                  type="password"
                  formControlName="password"
                />
              </c-input-group>

              <c-row>
                <c-col xs="12" class="d-grid gap-2">
                  <button 
                    cButton 
                    color="primary" 
                    type="submit"
                    class="py-2 fw-bold"
                    [disabled]="loading">
                    <span *ngIf="!loading">INGRESAR</span>
                    <c-spinner *ngIf="loading" size="sm" class="me-2"></c-spinner>
                    <span *ngIf="loading">Cargando...</span>
                  </button>
                </c-col> 
              </c-row>
            </form>
          </c-card-body>
        </c-card>
        <div class="text-center mt-4 text-muted small">
          © 2026 Tu Sistema de Cobros
        </div>
      </c-col>
    </c-row>
  </c-container>
</div>
